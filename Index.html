<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Pulse</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; touch-action: none; }
        body { background: #060409; color: #fff; font-family: sans-serif; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; overflow: hidden; }
        .score { font-size: 26px; font-weight: bold; color: #00f2fe; margin-top: 10px; }
        .container { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; height: 60vh; }
        canvas { background: transparent; display: block; width: 300px; height: 300px; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(6,4,9,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .btn { padding: 20px 40px; border-radius: 16px; border: none; font-size: 20px; font-weight: bold; background: linear-gradient(135deg, #00f2fe 0%, #0072ff 100%); color: #000; cursor: pointer; width: 85%; max-width: 250px; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <div class="score">Счет: <span id="score-val">0</span></div>
    
    <div class="container">
        <canvas id="game" width="300" height="300"></canvas>
        <div id="overlay" class="overlay">
            <button id="start-btn" class="btn">ПОЕХАЛИ</button>
        </div>
    </div>
    
    <div style="color: #555; font-size: 13px; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px;">ТАПАЙ ВНУТРИ ЗЕЛЕНОГО СЕКТОРА</div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');
            const overlay = document.getElementById('overlay');
            const startBtn = document.getElementById('start-btn');
            const scoreEl = document.getElementById('score-val');

            let score = 0;
            let isPlaying = false;
            let targetAngle = 1;
            let targetWidth = 0.7; 
            let ballAngle = 0;
            let ballSpeed = 0.04;
            const radius = 90;

            // Надежный таймер вместо requestAnimationFrame для гарантированной работы на мобилках
            setInterval(() => {
                ctx.clearRect(0, 0, 300, 300);
                
                // Серое кольцо
                ctx.beginPath(); 
                ctx.arc(150, 150, radius, 0, Math.PI * 2); 
                ctx.strokeStyle = 'rgba(255,255,255,0.08)'; 
                ctx.lineWidth = 12; 
                ctx.stroke();
                
                // Зеленая зона
                ctx.beginPath(); 
                ctx.arc(150, 150, radius, targetAngle - targetWidth/2, targetAngle + targetWidth/2); 
                ctx.strokeStyle = '#39ff14'; 
                ctx.lineWidth = 16; 
                ctx.stroke();
                
                // Движение шарика
                if (isPlaying) { 
                    ballAngle += ballSpeed; 
                    if (ballAngle > Math.PI * 2) ballAngle -= Math.PI * 2; 
                }
                
                // Розовый шарик
                ctx.beginPath(); 
                ctx.arc(150 + Math.cos(ballAngle)*radius, 150 + Math.sin(ballAngle)*radius, 10, 0, Math.PI * 2); 
                ctx.fillStyle = '#ff007f'; 
                ctx.fill();
            }, 1000 / 60); // Ровно 60 кадров в секунду

            // Универсальная функция нажатия для любых мобильных экранов
            function doTap(e) {
                if (!isPlaying) return;
                if (e) { e.preventDefault(); e.stopPropagation(); }

                let diff = ballAngle - targetAngle;
                while (diff < -Math.PI) diff += Math.PI * 2; 
                while (diff > Math.PI) diff -= Math.PI * 2;
                
                if (Math.abs(diff) <= targetWidth / 2) { 
                    score++; 
                    scoreEl.innerText = score; 
                    ballSpeed = Math.min(0.09, 0.04 + (score * 0.003)); 
                    targetAngle = Math.random() * Math.PI * 2; 
                    targetWidth = Math.max(0.35, 0.7 - (score * 0.015));
                } else { 
                    isPlaying = false; 
                    startBtn.innerText = "ПРОМАХ! ЕЩЕ РАЗ"; 
                    overlay.style.display = "flex"; 
                }
            }

            // Ловим нажатия на холсте всеми возможными способами
            canvas.addEventListener('touchstart', doTap, {passive: false});
            canvas.addEventListener('mousedown', doTap);

            // Функция запуска игры
            function pressStart(e) {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                score = 0; 
                scoreEl.innerText = "0"; 
                ballSpeed = 0.04; 
                targetWidth = 0.7;
                ballAngle = 0;
                targetAngle = Math.random() * Math.PI * 2;
                overlay.style.display = "none"; 
                
                setTimeout(() => { isPlaying = true; }, 50);
            }

            // Старт по отрыву пальца (самый стабильный способ для телефонов)
            startBtn.addEventListener('touchend', pressStart);
            startBtn.addEventListener('click', pressStart);
        });
    </script>
</body>
</html>
