<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Pulse</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
        body { background: #060409; color: #fff; font-family: sans-serif; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .score { font-size: 24px; font-weight: bold; color: #00f2fe; margin-top: 20px; }
        .container { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; }
        canvas { background: transparent; max-width: 100%; max-height: 100%; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(6,4,9,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; border-radius: 16px; }
        .btn { padding: 18px 36px; border-radius: 14px; border: none; font-size: 18px; font-weight: bold; background: linear-gradient(135deg, #00f2fe 0%, #0072ff 100%); color: #000; cursor: pointer; width: 85%; max-width: 260px; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="score">Счет: <span id="score-val">0</span></div>
    <div class="container">
        <canvas id="game" width="320" height="320"></canvas>
        <div id="overlay" class="overlay">
            <button id="start-btn" class="btn">ПОЕХАЛИ</button>
        </div>
    </div>
    <div style="color: #444; font-size: 12px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;">ТАПАЙ ВНУТРИ ЗЕЛЕНОГО СЕКТОРА</div>

    <script>
        // Защита: запускаем код строго ПОСЛЕ полной загрузки страницы телефоном
        window.addEventListener('load', () => {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');
            const overlay = document.getElementById('overlay');
            const startBtn = document.getElementById('start-btn');
            const scoreEl = document.getElementById('score-val');

            let score = 0;
            let isPlaying = false;
            let targetAngle = 0;
            let targetWidth = 0.65; // Сделал начальную зону чуть шире для удобства
            let ballAngle = 0;
            let ballSpeed = 0.035;
            let radius = 95;

            function draw() {
                ctx.clearRect(0, 0, 320, 320);
                
                // Рисуем серое кольцо
                ctx.beginPath(); 
                ctx.arc(160, 160, radius, 0, Math.PI * 2); 
                ctx.strokeStyle = 'rgba(255,255,255,0.08)'; 
                ctx.lineWidth = 10; 
                ctx.stroke();
                
                // Рисуем зеленую цель
                ctx.beginPath(); 
                ctx.arc(160, 160, radius, targetAngle - targetWidth/2, targetAngle + targetWidth/2); 
                ctx.strokeStyle = '#39ff14'; 
                ctx.lineWidth = 14; 
                ctx.stroke();
                
                // Логика движения шарика
                if (isPlaying) { 
                    ballAngle += ballSpeed; 
                    if (ballAngle > Math.PI * 2) ballAngle -= Math.PI * 2; 
                }
                
                // Рисуем розовый шарик
                ctx.beginPath(); 
                ctx.arc(160 + Math.cos(ballAngle)*radius, 160 + Math.sin(ballAngle)*radius, 9, 0, Math.PI * 2); 
                ctx.fillStyle = '#ff007f'; 
                ctx.fill();
                
                requestAnimationFrame(draw);
            }

            function tap(e) {
                if (!isPlaying) return; 
                if(e) e.preventDefault(); // Защита от двойных тапов на смартфонах
                
                let diff = ballAngle - targetAngle;
                while (diff < -Math.PI) diff += Math.PI * 2; 
                while (diff > Math.PI) diff -= Math.PI * 2;
                
                if (Math.abs(diff) <= targetWidth / 2) { 
                    score++; 
                    scoreEl.innerText = score; 
                    ballSpeed = Math.min(0.085, 0.035 + (score * 0.0025)); 
                    targetAngle = Math.random() * Math.PI * 2; 
                    targetWidth = Math.max(0.3, 0.65 - (score * 0.015));
                } else { 
                    isPlaying = false; 
                    startBtn.innerText = "ПРОМАХ! ЕЩЕ РАЗ"; 
                    overlay.style.display = "flex"; 
                }
            }

            // Вешаем клики только на игровое поле
            canvas.addEventListener('touchstart', tap, {passive: false}); 
            canvas.addEventListener('mousedown', tap);
            
            // Логика кнопки "ПОЕХАЛИ"
            function clickStart(e) {
                if(e) e.preventDefault();
                score = 0; 
                scoreEl.innerText = 0; 
                ballSpeed = 0.035; 
                targetWidth = 0.65;
                ballAngle = 0;
                targetAngle = Math.random() * Math.PI * 2;
                overlay.style.display = "none"; 
                
                // Небольшая микрозадержка, чтобы телефон успел убрать палец с кнопки
                setTimeout(() => { isPlaying = true; }, 100);
            }

            startBtn.addEventListener('click', clickStart);
            startBtn.addEventListener('touchend', clickStart);
            
            draw();
        });
    </script>
</body>
</html>
